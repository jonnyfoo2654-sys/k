name: Build AutoCAD QTO

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:

    runs-on: windows-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: List repository files
        run: |
          echo "Repository contents:"
          dir
          echo ""
          echo "Recursive listing:"
          dir /s

      - name: Check if solution exists
        shell: pwsh
        run: |
          $sln = Get-ChildItem -Recurse -Filter *.sln

          if ($sln.Count -eq 0) {
            Write-Error "No .sln file found in repository"
            exit 1
          }

          echo "Solution found:"
          $sln.FullName

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: Restore packages
        shell: pwsh
        run: |
          $sln = (Get-ChildItem -Recurse -Filter *.sln | Select-Object -First 1).FullName
          nuget restore "$sln"

      - name: Build solution
        shell: pwsh
        run: |
          $sln = (Get-ChildItem -Recurse -Filter *.sln | Select-Object -First 1).FullName
          msbuild "$sln" /p:Configuration=Release

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: AutoCADQTO
          path: |
            **/bin/Release/**
